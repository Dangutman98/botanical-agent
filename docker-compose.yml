services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botanical-web
    ports:
      - "3000:3000"
    environment:
      OLLAMA_MODEL: qwen2.5:3b
      OLLAMA_MAX_TOKENS: 100
      OLLAMA_BASE_URL: http://ollama:11434/v1
      MONGODB_URI: mongodb://mongo:27017/botanical_agent
    depends_on:
      ollama:
        condition: service_started
      mongo:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: botanical-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: botanical-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  ollama_data:
  mongo_data:
