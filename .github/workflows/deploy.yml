name: Deploy to AWS Lambda

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform
  TF_VERSION: 1.8.0

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.lambda \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/botanical-agent-prod:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/botanical-agent-prod:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=botanical-agent-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=terraform.tfstate" \
            -reconfigure

      - name: Create S3 backend if missing
        working-directory: ${{ env.TF_DIR }}
        run: |
          aws s3api head-bucket --bucket botanical-agent-terraform-state-${{ secrets.AWS_ACCOUNT_ID }} 2>/dev/null || \
          aws s3 mb s3://botanical-agent-terraform-state-${{ secrets.AWS_ACCOUNT_ID }} --region ${{ env.AWS_REGION }} || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
